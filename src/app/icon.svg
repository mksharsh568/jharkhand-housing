<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Black background square -->
  <rect width="100" height="100" fill="#111111" rx="14"/>

  <!-- Left O -->
  <circle cx="18" cy="45" r="13" fill="none" stroke="#FF4500" stroke-width="5"/>

  <!-- Right O -->
  <circle cx="82" cy="45" r="13" fill="none" stroke="#FF4500" stroke-width="5"/>

  <!-- A — left leg -->
  <polygon points="50,12  65,72  59,72  50,32" fill="white"/>
  <!-- A — right leg -->
  <polygon points="50,12  35,72  41,72  50,32" fill="white"/>
  <!-- A — crossbar -->
  <rect x="37" y="52" width="26" height="6" rx="1" fill="white"/>

  <!-- OAO label -->
  <text x="50" y="90"
    text-anchor="middle"
    font-family="Arial Black,Arial,sans-serif"
    font-weight="900"
    font-size="9"
    fill="#FF4500"
    letter-spacing="2">OAO</text>
</svg>
